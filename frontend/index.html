<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart IoT Command Center</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-gauge"></script>
</head>
<body>

<!-- Particle Canvas Background -->
<canvas id="bgCanvas"></canvas>

<!-- Scanline overlay -->
<div class="scanlines"></div>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="logo-pulse"></div>
    <span class="logo-text">ENV<span class="accent">CORE</span></span>
  </div>
  <h1>Smart Environmental Monitoring</h1>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-label">LIVE</span>
  </div>
</header>

<!-- Status Cards -->
<div class="cards">

  <div class="card" id="tempCard">
    <div class="card-icon-wrap">
      <svg class="card-icon temp-icon" viewBox="0 0 60 120">
        <defs>
          <linearGradient id="thermGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#ff4d4d"/>
            <stop offset="100%" stop-color="#ffaa00"/>
          </linearGradient>
        </defs>
        <!-- thermometer body -->
        <rect x="22" y="10" width="16" height="70" rx="8" fill="none" stroke="#ff4d4d" stroke-width="2"/>
        <!-- fill bar animated -->
        <rect class="therm-fill" x="25" y="20" width="10" height="58" rx="5" fill="url(#thermGrad)"/>
        <!-- bulb -->
        <circle cx="30" cy="95" r="12" fill="#ff4d4d" opacity="0.9"/>
        <circle cx="30" cy="95" r="7" fill="#ff6b6b"/>
        <!-- tick marks -->
        <line x1="38" y1="30" x2="44" y2="30" stroke="#ff4d4d" stroke-width="1.5"/>
        <line x1="38" y1="45" x2="44" y2="45" stroke="#ff4d4d" stroke-width="1.5"/>
        <line x1="38" y1="60" x2="44" y2="60" stroke="#ff4d4d" stroke-width="1.5"/>
        <line x1="38" y1="75" x2="44" y2="75" stroke="#ff4d4d" stroke-width="1.5"/>
      </svg>
      <!-- heat wave rings -->
      <div class="heat-ring r1"></div>
      <div class="heat-ring r2"></div>
      <div class="heat-ring r3"></div>
    </div>
    <div class="card-body">
      <div class="card-label">TEMPERATURE</div>
      <p id="temp" class="card-value">-- °C</p>
      <div class="card-bar"><div class="bar-fill temp-bar"></div></div>
    </div>
  </div>

  <div class="card" id="humCard">
    <div class="card-icon-wrap">
      <svg class="card-icon hum-icon" viewBox="0 0 80 100">
        <defs>
          <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#0057ff"/>
          </linearGradient>
        </defs>
        <!-- Main drop -->
        <path class="drop-main" d="M40 10 Q65 45 65 62 A25 25 0 0 1 15 62 Q15 45 40 10Z" fill="url(#dropGrad)" opacity="0.85"/>
        <!-- shine -->
        <ellipse cx="32" cy="52" rx="5" ry="9" fill="white" opacity="0.25" transform="rotate(-20 32 52)"/>
        <!-- mini drops -->
        <path class="drop-mini d1" d="M15 20 Q22 32 22 37 A7 7 0 0 1 8 37 Q8 32 15 20Z" fill="#00e5ff" opacity="0.6"/>
        <path class="drop-mini d2" d="M62 15 Q68 25 68 30 A6 6 0 0 1 56 30 Q56 25 62 15Z" fill="#00e5ff" opacity="0.5"/>
      </svg>
      <!-- ripple rings -->
      <div class="ripple rip1"></div>
      <div class="ripple rip2"></div>
    </div>
    <div class="card-body">
      <div class="card-label">HUMIDITY</div>
      <p id="hum" class="card-value">-- %</p>
      <div class="card-bar"><div class="bar-fill hum-bar"></div></div>
    </div>
  </div>

  <div class="card" id="airCard">
    <div class="card-icon-wrap">
      <!-- AQI swirl animation -->
      <div class="aqi-orb">
        <div class="aqi-ring aq1"></div>
        <div class="aqi-ring aq2"></div>
        <div class="aqi-ring aq3"></div>
        <svg class="aqi-leaf" viewBox="0 0 60 60">
          <path d="M30 5 Q55 10 55 35 Q55 55 30 58 Q5 55 5 35 Q5 10 30 5Z" fill="none" stroke="#00ff88" stroke-width="2"/>
          <path d="M30 58 Q30 35 45 20" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="3 3"/>
        </svg>
      </div>
    </div>
    <div class="card-body">
      <div class="card-label">AIR QUALITY</div>
      <p id="air" class="card-value">--</p>
      <p id="airStatus" class="card-status">--</p>
    </div>
  </div>

</div>

<!-- Graphs -->
<div class="section-title"><span>REAL-TIME ANALYTICS</span></div>
<div class="graphs">
  <div class="graph-box" onclick="openModal('tempHumModal')">
    <div class="graph-header">
      <h3>Temperature &amp; Humidity</h3>
      <span class="expand-icon">⤢</span>
    </div>
    <canvas id="tempHumChart"></canvas>
  </div>

  <div class="graph-box" onclick="openModal('airModal')">
    <div class="graph-header">
      <h3>Air Quality Index</h3>
      <span class="expand-icon">⤢</span>
    </div>
    <canvas id="airChart"></canvas>
  </div>
</div>

<!-- Gauges -->
<div class="section-title"><span>SENSOR GAUGES</span></div>
<div class="gauge-row">
  <div class="gauge-container">
    <h3>Air Quality</h3>
    <div class="gauge-wrapper">
      <canvas id="airGauge"></canvas>
      <div class="gauge-value" id="airGaugeValue">--</div>
    </div>
  </div>
  <div class="gauge-container">
    <h3>Temperature</h3>
    <div class="gauge-wrapper">
      <canvas id="tempGauge"></canvas>
      <div class="gauge-value" id="tempGaugeValue">--</div>
    </div>
  </div>
</div>

<button id="exportBtn">📤 Export Data to CSV</button>

<!-- MODALS -->
<div id="tempHumModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal('tempHumModal')" class="close">&times;</span>
    <h3 class="modal-title">Temperature &amp; Humidity — Full View</h3>
    <canvas id="tempHumLarge"></canvas>
  </div>
</div>

<div id="airModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal('airModal')" class="close">&times;</span>
    <h3 class="modal-title">Air Quality Index — Full View</h3>
    <canvas id="airLarge"></canvas>
  </div>
</div>

<script src="script.js"></script>
<script>
// Particle background
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<70;i++) particles.push({
    x:Math.random()*1920,y:Math.random()*1080,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    r:Math.random()*1.5+.5,a:Math.random()
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,229,255,${p.a*.4})`;
      ctx.fill();
    });
    // connect nearby
    for(let i=0;i<particles.length;i++)
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(0,229,255,${.08*(1-d/120)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
